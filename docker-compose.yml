version: '3.8'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://gold_user:gold_pass@db:5432/gold_reserve_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: gold_reserve_db
      POSTGRES_USER: gold_user
      POSTGRES_PASSWORD: gold_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold_user -d gold_reserve_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
